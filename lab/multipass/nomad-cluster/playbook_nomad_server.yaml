# Delegate gathering of facts, so we can run this playbook with a limit when
# performing updates that require control of the Nomad process restart.
- hosts: all
  tasks:
    - name: "delegate_fact_gathering"
      ansible.builtin.setup:
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['nomad_server'] }}"

- hosts: nomad_server
  roles:
    - role: common
      common_hostname: "{{ inventory_hostname }}"
      common_apt_packages:
        - "build-essential"
        - "git"
        - "jq"
        - "make"
        - "net-tools"
        - "unzip"

    - role: gantsign.golang
      golang_gopath: "/home/{{ ansible_user_id }}/go"
      golang_version: "1.25.5"
      golang_mirror: "https://dl.google.com/go/"
      golang_redis_sha256sum: "b00b694903d126c588c378e72d3545549935d3982635ba3f7a964c9fa23fe3b9"

    - role: tls
      tls_path: ".tls"
      tls_ca_generate: false
      tls_self_signed_generate:
        - agent-name: "{{ inventory_hostname }}"
          ip: "{{ ansible_facts['default_ipv4']['address'] }}"
          dns: "server.lcy1.nomad"

    - role: consul
      when: (consul_address | default('') | trim) != ''
      consul_binary_version: "1.22.6"
      consul_binary_checksum: "sha256:a760371111ff3e1f0813672b240f833077f73c13ea37e75abc223ede534100b6"
      consul_config_dir: "/etc/consul.d/"
      consul_data_dir: "/opt/consul/data/"
      consul_config_template: "./templates/consul_client.hcl.j2"

    - role: nomad
      nomad_binary_version: "2.0.2"
      nomad_binary_checksum: "sha256:a7c66ad9bad3093c0a5aa4e845c1eeb8550659a5011eabb5cf7f042d3ab7208b"
      nomad_config_template: "./templates/nomad_server.hcl.j2"
      nomad_region: "lcy1"
      nomad_tls_enabled: true
      nomad_tls_ca_cert: "./.tls/ca.pem"
      nomad_tls_cert: "./.tls/{{ inventory_hostname }}.pem"
      nomad_tls_cert_key: "./.tls/{{ inventory_hostname }}-key.pem"
