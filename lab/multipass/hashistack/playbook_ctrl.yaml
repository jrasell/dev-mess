- hosts: all
  tasks:
    - name: "delegate_fact_gathering"
      ansible.builtin.setup:
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['hashi_ctrl'] }}"

- hosts: hashi_ctrl
  roles:
    - role: common
      common_hostname: "{{ inventory_hostname }}"
      common_apt_packages:
        - "build-essential"
        - "git"
        - "jq"
        - "make"
        - "net-tools"
        - "unzip"

    - role: tls
      tls_path: ".tls"
      tls_ca_generate: false
      tls_self_signed_generate:
        - agent-name: "vault-{{ inventory_hostname }}"
          ip: "{{ ansible_facts['default_ipv4']['address'] }}"
        - agent-name: "consul-{{ inventory_hostname }}"
          ip: "{{ ansible_facts['default_ipv4']['address'] }}"
          dns: "server.lcy1.consul"
        - agent-name: "nomad-{{ inventory_hostname }}"
          ip: "{{ ansible_facts['default_ipv4']['address'] }}"
          dns: "server.lcy1.nomad"

    - role: consul
      consul_binary_version: "2.0.0"
      consul_binary_checksum: "sha256:caea9d634b18ef137b0e62adac5dd14407cd942092c2c6281b70edd90b86d5e2"
      consul_config_template: "./templates/consul_server.hcl.j2"
      consul_tls_enabled: true
      consul_tls_ca_cert: "./.tls/ca.pem"
      consul_tls_cert: "./.tls/consul-{{ inventory_hostname }}.pem"
      consul_tls_cert_key: "./.tls/consul-{{ inventory_hostname }}-key.pem"

    - role: vault
      vault_binary_version: "2.0.0"
      vault_binary_checksum: "sha256:5f04207fd0fbabbb8c6cca494fdee96f81bb0a82e1176670649e1aeeaadf0281"
      vault_config_dir: "/etc/vault.d/"
      vault_data_dir: "/opt/vault/data/"
      vault_config_template: "./templates/vault_server.hcl.j2"
      vault_tls_enabled: true
      vault_tls_ca_cert: "./.tls/ca.pem"
      vault_tls_cert: "./.tls/vault-{{ inventory_hostname }}.pem"
      vault_tls_cert_key: "./.tls/vault-{{ inventory_hostname }}-key.pem"
      vault_consul_tls_enabled: true
      vault_consul_tls_ca_cert: "./.tls/ca.pem"
      vault_consul_tls_cert: "./.tls/consul-{{ inventory_hostname }}.pem"
      vault_consul_tls_cert_key: "./.tls/consul-{{ inventory_hostname }}-key.pem"
      vault_consul_token: "{{ consul_vault_token }}"

    - role: nomad
      nomad_binary_version: "2.0.2"
      nomad_binary_checksum: "sha256:a7c66ad9bad3093c0a5aa4e845c1eeb8550659a5011eabb5cf7f042d3ab7208b"
      nomad_config_template: "./templates/nomad_server.hcl.j2"
      nomad_tls_enabled: true
      nomad_tls_ca_cert: "./.tls/ca.pem"
      nomad_tls_cert: "./.tls/nomad-{{ inventory_hostname }}.pem"
      nomad_tls_cert_key: "./.tls/nomad-{{ inventory_hostname }}-key.pem"
      nomad_consul_tls_enabled: true
      nomad_consul_tls_ca_cert: "./.tls/ca.pem"
      nomad_consul_tls_cert: "./.tls/consul-{{ inventory_hostname }}.pem"
      nomad_consul_tls_cert_key: "./.tls/consul-{{ inventory_hostname }}-key.pem"
      nomad_consul_token: "{{ consul_nomad_token }}"
