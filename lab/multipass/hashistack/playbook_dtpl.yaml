# Gather facts from both the control plane and data plane hosts. The control
# plane facts are required so the data plane agents can discover and join the
# Consul and Nomad servers.
- hosts: all
  tasks:
    - name: "delegate_fact_gathering"
      ansible.builtin.setup:
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['hashi_ctrl'] + groups['hashi_dtpl'] }}"

- hosts: hashi_dtpl
  roles:
    - role: common
      common_hostname: "{{ inventory_hostname }}"
      common_apt_packages:
        - "build-essential"
        - "git"
        - "jq"
        - "make"
        - "net-tools"
        - "unzip"

    - role: "geerlingguy.docker"
      become: true
      docker_users:
        - "{{ ansible_user_id }}"

    - role: cni
      cni_configs:
        - name: "wireguard.conf"
          content: '{"name": "wireguard","type": "smuggle"}'

    - role: tls
      tls_path: ".tls"
      tls_ca_generate: false
      tls_self_signed_generate:
        - agent-name: "consul-{{ inventory_hostname }}"
          ip: "{{ ansible_facts['default_ipv4']['address'] }}"
          dns: "client.lcy1.consul"
        - agent-name: "nomad-{{ inventory_hostname }}"
          ip: "{{ ansible_facts['default_ipv4']['address'] }}"
          dns: "client.lcy1.nomad"

    - role: consul
      consul_binary_version: "2.0.0"
      consul_binary_checksum: "sha256:caea9d634b18ef137b0e62adac5dd14407cd942092c2c6281b70edd90b86d5e2"
      consul_config_template: "./templates/consul_client.hcl.j2"
      consul_tls_enabled: true
      consul_tls_ca_cert: "./.tls/ca.pem"
      consul_tls_cert: "./.tls/consul-{{ inventory_hostname }}.pem"
      consul_tls_cert_key: "./.tls/consul-{{ inventory_hostname }}-key.pem"

    - role: nomad
      nomad_binary_version: "2.0.2"
      nomad_binary_checksum: "sha256:a7c66ad9bad3093c0a5aa4e845c1eeb8550659a5011eabb5cf7f042d3ab7208b"
      nomad_config_template: "./templates/nomad_client.hcl.j2"
      nomad_tls_enabled: true
      nomad_tls_ca_cert: "./.tls/ca.pem"
      nomad_tls_cert: "./.tls/nomad-{{ inventory_hostname }}.pem"
      nomad_tls_cert_key: "./.tls/nomad-{{ inventory_hostname }}-key.pem"
      nomad_consul_tls_enabled: true
      nomad_consul_tls_ca_cert: "./.tls/ca.pem"
      nomad_consul_tls_cert: "./.tls/consul-{{ inventory_hostname }}.pem"
      nomad_consul_tls_cert_key: "./.tls/consul-{{ inventory_hostname }}-key.pem"
      nomad_consul_token: "{{ consul_nomad_token }}"
      nomad_driver_plugins:
        - name: "nomad-driver-podman"
          version: "0.6.4"
          checksum: "sha256:e0c2ba459bfa5d4d6a5d9efdc05ac50936f8529d888b04e28725f302342f57d5"
