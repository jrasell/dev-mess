- name: "restart_consul"
  become: true
  ansible.builtin.systemd_service:
    name: "consul"
    state: "restarted"

- name: "enable_consul"
  become: true
  ansible.builtin.systemd_service:
    name: "consul"
    enabled: true
    masked: no

- name: "reload_systemd"
  become: true
  ansible.builtin.systemd:
    daemon_reexec: true
