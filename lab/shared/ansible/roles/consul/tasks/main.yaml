- name: "create_consul_group"
  become: true
  ansible.builtin.group:
    name: "{{ consul_group }}"
    system: true
    state: present

- name: "create_consul_user"
  become: true
  ansible.builtin.user:
    name: "{{ consul_user }}"
    group: "{{ consul_group }}"
    system: true
    create_home: false
    shell: /usr/sbin/nologin
    state: present

- name: "installed_version_check"
  command: "/usr/local/bin/consul version"
  register: binary_installed_version
  ignore_errors: true
  changed_when: consul_binary_version|string not in binary_installed_version.stdout
  notify: "restart_consul"

- name: "install_release_binary"
  ansible.builtin.include_role:
    name: hashicorp_release
  vars:
    hashicorp_release_product_name: "consul"
    hashicorp_release_product_version: "{{ consul_binary_version }}"
    hashicorp_release_product_checksum: "{{ consul_binary_checksum }}"

- name: "create_service_file"
  become: true
  ansible.builtin.template:
    src: "consul.service.j2"
    dest: "/etc/systemd/system/consul.service"
    owner: "root"
    group: "root"
    mode: "0755"
  notify:
    - "reload_systemd"
    - "enable_consul"

- name: "create_config_dir"
  become: true
  ansible.builtin.file:
    path: "{{ consul_config_dir }}"
    state: directory
    mode: "0700"
    owner: "{{ consul_user }}"
    group: "{{ consul_group }}"

- name: "create_data_dir"
  become: true
  ansible.builtin.file:
    path: "{{ consul_data_dir }}"
    state: directory
    mode: "0700"
    owner: "{{ consul_user }}"
    group: "{{ consul_group }}"

- name: "write_config_template"
  become: true
  ansible.builtin.template:
    src: "{{ consul_config_template }}"
    dest: "{{ consul_config_dir }}/base.hcl"
    owner: "{{ consul_user }}"
    group: "{{ consul_group }}"
    mode: "0600"
  notify: "restart_consul"

- block:
    - name: "create_tls_directory"
      become: true
      ansible.builtin.file:
        path: "{{ consul_config_dir }}/.tls"
        owner: "{{ consul_user }}"
        group: "{{ consul_group }}"
        state: "directory"
        mode: "0700"
    - name: "write_tls_files"
      become: true
      ansible.builtin.copy:
        dest: "{{ item.dest }}"
        src: "{{ item.src }}"
        owner: "{{ consul_user }}"
        group: "{{ consul_group }}"
        mode: "0600"
      loop:
        - dest: "{{ consul_config_dir }}/.tls/ca.pem"
          src: "{{ consul_tls_ca_cert }}"
        - dest: "{{ consul_config_dir }}/.tls/cert.pem"
          src: "{{ consul_tls_cert }}"
        - dest: "{{ consul_config_dir }}/.tls/cert-key.pem"
          src: "{{ consul_tls_cert_key }}"
    - name: "create_tls_config_file"
      become: true
      ansible.builtin.template:
        src: "tls.hcl.j2"
        dest: "{{ consul_config_dir }}/tls.hcl"
        owner: "{{ consul_user }}"
        group: "{{ consul_group }}"
        mode: "0600"
  notify: "restart_consul"
  when: consul_tls_enabled is true
