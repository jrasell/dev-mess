- name: "restart_vault"
  become: true
  ansible.builtin.systemd_service:
    name: "vault"
    state: "restarted"

- name: "enable_vault"
  become: true
  ansible.builtin.systemd_service:
    name: "vault"
    enabled: true
    masked: no

- name: "reload_systemd"
  become: true
  ansible.builtin.systemd:
    daemon_reexec: true
